<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>battleship</title>
    <script type="module" src="./script.js"></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="main">
        computer board:
        <div>Ships sunk:</div>
        <div id="computerShipsSunk"></div>

        <div id="computerBoard" class="board"></div>
        <br><br>
        <div id="verdictComp"></div>
        player board:
        <div>Ships sunk:</div>
        <div id="playerShipsSunk"></div>

        <div id="playerBoard" class="board"></div>
        <br><br>
        <div id="verdictPlayer"></div>
        <div id="playerShipsContainer">
            <div id="playerShip1" class="playerShip" draggable="true"></div>
            <br>
            <button id="playerShip1ChangeAxis">Click to change axis of red ship</button>
            <br>
            <br>
            <div id="playerShip2" class="playerShip" draggable="true"></div>
            <br>
            <button id="playerShip2ChangeAxis">Click to change axis of yellow ship</button>
            <br>
            <br>
            <div id="playerShip3" class="playerShip" draggable="true"></div>
            <br>
            <button id="playerShip3ChangeAxis">Click to change axis of green ship</button>
            <br>
            <br>
            <div id="playerShip4" class="playerShip" draggable="true"> </div>
            <br>
            <button id="playerShip4ChangeAxis">Click to change axis of tirquoise ship</button>
            <br>
            <br>
            <div id="playerShip5" class="playerShip" draggable="true"></div>
            <br>
            <button id="playerShip5ChangeAxis">Click to change axis of blue ship</button>
            <br>
            <br>
            <div id="playerShip6" class="playerShip" draggable="true"></div>
            <br>
            <button id="playerShip6ChangeAxis">Click to change axis of pink ship</button>
            <br>
            <br>
            <div id="playerShip7" class="playerShip" draggable="true"></div>
            <br>
            <button id="playerShip7ChangeAxis">Click to change axis of purple ship</button>
            <br>
            <br>
            <div id="playerShip8" class="playerShip" draggable="true"></div>
            <br>
            <button id="playerShip8ChangeAxis">Click to change axis of white ship</button>
            <br>
            <br>
            <div id="playerShip9" class="playerShip" draggable="true"></div>
            <br>
            <button id="playerShip9ChangeAxis">Click to change axis of black ship</button>
            <br>
            <br>
            <div id="playerShip10" class="playerShip" draggable="true"></div>
            <br><br>
            <button id="playerShip10ChangeAxis">Click to change axis of grey ship</button>
            <br>
            <br>
        </div>
    </main>
</body>
</html>
